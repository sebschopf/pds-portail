services:
  - type: web
    name: pds-portail-backend
    runtime: python
    region: frankfurt
    buildCommand: uv sync --frozen
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: CKAN_BASE_URL
        value: https://opendata.swiss
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: EXPOSE_API_DOCS
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12"