name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-backend:
    name: Backend — format, lint, type-check, test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Format check (black)
        run: uv run black --check app/ tests/

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Type check (mypy)
        run: uv run mypy app/ tests/

      - name: Test with coverage (>= 80%)
        run: uv run pytest --cov=app --cov-fail-under=80 --cov-report=term-missing

  quality-frontend:
    name: Frontend — check, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Build (production)
        run: npm run build