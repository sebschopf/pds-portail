# Configuration Fly.io pour PDS-Portail Backend
# Documentation: https://fly.io/docs/reference/configuration/
#
# Secrets (ne jamais committer):
# Configurer via: fly secrets set VAR_NAME=value
#   - POLAR_SECRET_KEY (Polar API key for webhook verification)
#   - POLAR_WEBHOOK_SECRET (Polar webhook signing secret)
#   - SMTP_USER (Brevo SMTP username)
#   - SMTP_PASSWORD (Brevo SMTP password)

app = "pds-portail-backend"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////var/data/app.db"
  CKAN_BASE_URL = "https://opendata.swiss"
  CORS_ALLOWED_ORIGINS = "https://pds-portail.vercel.app"
  ENABLE_CKAN_SYNC = "true"
  CKAN_SYNC_BOOTSTRAP_IF_EMPTY = "true"
  CKAN_SYNC_INTERVAL_MINUTES = "60"
  CKAN_SYNC_BATCH_ROWS = "100"
  CKAN_SYNC_MAX_BATCHES_PER_RUN = "10"
  CKAN_SYNC_BATCH_DELAY_SECONDS = "1.0"
  EXPOSE_API_DOCS = "false"
  PYTHON_VERSION = "3.12"
  # Polar integration (dataset surveillance)
  PUBLIC_POLAR_PRODUCT_ID = "product_watch_monthly"
  SMTP_HOST = "smtp-relay.brevo.com"
  SMTP_PORT = "587"
  SMTP_FROM = "schopfer@moustik.site"
  SMTP_DAILY_LIMIT = "50"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

  [[http_service.checks]]
    path = "/api/v1/health"
    interval = "30s"
    timeout = "10s"
    grace_period = "10s"
    method = "GET"

[[mounts]]
  source = "pds_portail_cache"
  destination = "/var/data"