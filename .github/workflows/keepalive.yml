name: Health check backend Fly.io

# Fly.io n'a pas de cold-sleep, ce workflow sert uniquement de
# monitoring externe (alerte si le backend est down plus de 12 min).

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl --fail --silent --max-time 30 https://pds-portail-backend.fly.dev/api/v1/health
